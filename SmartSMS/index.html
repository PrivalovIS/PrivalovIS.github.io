<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSM SMS Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Web Serial + GSM Modem</p>
          <h1>SMS Messenger</h1>
        </div>
        <div class="topbar-actions">
          <label class="baud-select">
            <span>Скорость</span>
            <select id="baudRate">
              <option value="9600">9600</option>
              <option value="19200">19200</option>
              <option value="38400">38400</option>
              <option value="57600">57600</option>
              <option value="115200" selected>115200</option>
            </select>
          </label>
          <button id="connectBtn" class="primary-btn">Подключить модем</button>
          <button id="disconnectBtn" class="ghost-btn" disabled>Отключить</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <div class="sidebar-card compose-card">
            <label for="newChatNumber">Новый чат</label>
            <div class="compose-row">
              <input
                id="newChatNumber"
                type="tel"
                placeholder="+79991234567"
                autocomplete="off"
              />
              <button id="createChatBtn" class="primary-btn">Открыть</button>
            </div>
          </div>

          <div class="sidebar-card chats-card">
            <div class="section-title">
              <h2>Чаты</h2>
              <span id="chatCount">0</span>
            </div>
            <div id="chatList" class="chat-list empty-state">
              <p>Пока нет диалогов. Подключите модем и создайте чат.</p>
            </div>
          </div>
        </aside>

        <section class="chat-panel">
          <div class="chat-header">
            <div>
              <p class="eyebrow">Активный диалог</p>
              <h2 id="activeChatTitle">Выберите чат</h2>
            </div>
            <div class="chat-header-actions">
              <button id="refreshInboxBtn" class="ghost-btn" disabled>Обновить входящие</button>
            </div>
          </div>

          <div id="messageList" class="message-list empty-state">
            <p>Здесь будут сообщения выбранного диалога.</p>
          </div>

          <form id="composerForm" class="composer">
            <textarea
              id="messageInput"
              rows="3"
              placeholder="Введите SMS. Поддерживаются кириллица и латиница."
              disabled
            ></textarea>
            <div class="composer-actions">
              <div class="composer-hint">Отправка идет через AT-команды в UCS2.</div>
              <button id="sendBtn" type="submit" class="primary-btn" disabled>
                Отправить SMS
              </button>
            </div>
          </form>
        </section>
      </main>

      <section class="log-panel">
        <div class="section-title">
          <h2>Лог модема</h2>
          <button id="clearLogBtn" class="ghost-btn">Очистить</button>
        </div>
        <div id="logOutput" class="log-output"></div>
      </section>
    </div>

    <template id="chatItemTemplate">
      <button class="chat-item" type="button">
        <div class="chat-item-main">
          <strong class="chat-item-title"></strong>
          <span class="chat-item-preview"></span>
        </div>
        <div class="chat-item-meta">
          <span class="chat-item-time"></span>
          <span class="chat-item-badge hidden">0</span>
        </div>
      </button>
    </template>

    <template id="messageTemplate">
      <article class="message-bubble">
        <div class="message-meta">
          <span class="message-direction"></span>
          <time class="message-time"></time>
        </div>
        <p class="message-text"></p>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
